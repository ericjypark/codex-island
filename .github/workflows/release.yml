name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Stage Sparkle private key
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [[ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY secret is not set — see docs/SPARKLE.md"
            exit 1
          fi
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_priv"
          umask 077
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          echo "SPARKLE_PRIVATE_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Build DMG + sign appcast
        run: ./release.sh

      - name: Compute checksum
        id: sha
        run: echo "sha=$(shasum -a 256 dist/CodexIsland-*.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CodexIsland-*.dmg
            dist/appcast.xml
          generate_release_notes: true
          body: |
            **SHA-256:** `${{ steps.sha.outputs.sha }}`

            ⚠️ **Unsigned build** — see the README for install instructions.

            One-line install:
            ```
            brew install --cask --no-quarantine codexisland
            ```
